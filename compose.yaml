services:
  server:
    build:
      context: .
      dockerfile: SecureLogin/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=sqldatabase;Database=UserManagementDb;User Id=sa;Password=Password123!
    ports:
      - 8080:8080
    depends_on:
      sqldatabase:
        condition: service_healthy

  sqldatabase:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: sqldatabase
    ports:
      - "8095:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s
    restart: always
    volumes:
      - sqldatabase_data:/var/opt/mssql

volumes:
  sqldatabase_data:
